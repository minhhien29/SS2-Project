<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Image Editing System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>AI Image Editing System</h1>
    <p class="subtitle">Upload an image and edit it using a natural language instruction.</p>

    <div class="card form-card">
      <label for="imageInput" class="label">Upload Image</label>
      <input type="file" id="imageInput" accept="image/*" />

      <label for="promptInput" class="label">Enter Prompt</label>
      <textarea
        id="promptInput"
        placeholder="Example: change sky to sunset"
      ></textarea>

      <button id="editBtn">Edit Image</button>
      <p id="statusText" class="status"></p>
    </div>

    <div class="preview-grid">
      <div class="card preview-card">
        <h3>Original Image</h3>
        <div class="image-wrapper">
          <img id="originalPreview" alt="Original preview" />
        </div>
      </div>

      <div class="card preview-card">
        <h3>Edited Image</h3>
        <div class="image-wrapper">
          <img id="editedPreview" alt="Edited preview" />
        </div>
      </div>
    </div>

    <div class="card download-card">
      <a id="downloadLink" href="#" download="edited_image.png" class="download-btn">
        Download Edited Image
      </a>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
